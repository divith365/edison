<!-- BACK TO TOP -->
<a id="backToTop" class="back-to-top" href="#" aria-label="Back to top">
  <svg class="progress-circle" viewBox="0 0 46 46" xmlns="http://www.w3.org/2000/svg">
    <circle class="progress-circle-bg" cx="23" cy="23" r="21" fill="none" stroke-width="2.5"/>
    <circle class="progress-circle-bar" cx="23" cy="23" r="21" fill="none" stroke-width="2.5" stroke-linecap="round"/>
  </svg>
  <svg class="arrow-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
    <path d="M12 4l-8 8h5v8h6v-8h5z"/>
  </svg>
</a>

<!-- JS SCRIPTS -->
<script>
  // Mobile menu
  function toggleMenu(){
    document.getElementById('mobileMenu').classList.toggle('open');
    document.body.style.overflow = document.getElementById('mobileMenu').classList.contains('open') ? 'hidden' : '';
  }

  // Scroll Progress functionality (Top progress bar)
  (function(){
    const scrollProgress = document.getElementById('scrollProgress');
    window.addEventListener('scroll', () => {
      const scrollTop = window.scrollY;
      const docHeight = document.documentElement.scrollHeight - window.innerHeight;
      const scrollPercent = docHeight > 0 ? scrollTop / docHeight : 0;
      if (scrollProgress) {
        scrollProgress.style.width = `${scrollPercent * 100}%`;
      }
    });
  })();

  // Back to Top functionality
  (function () {
    const btn = document.getElementById('backToTop');
    const bar = btn.querySelector('.progress-circle-bar');
    const circumference = 2 * Math.PI * 21;
    bar.style.strokeDasharray  = circumference;
    bar.style.strokeDashoffset = circumference;

    function updateProgress() {
      const scrollTop    = window.scrollY || document.documentElement.scrollTop;
      const docHeight    = document.documentElement.scrollHeight - document.documentElement.clientHeight;
      const progress     = docHeight > 0 ? scrollTop / docHeight : 0;
      const offset       = circumference * (1 - progress);
      bar.style.strokeDashoffset = offset;

      if (scrollTop > 300) {
        btn.classList.add('show');
      } else {
        btn.classList.remove('show');
      }
    }
    window.addEventListener('scroll', updateProgress, { passive: true });
    btn.addEventListener('click', function (e) {
      e.preventDefault();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
    updateProgress();
  })();

  // Scroll Reveal Animations
  (function() {
    const initReveal = () => {
      const revealEls = document.querySelectorAll('.reveal');
      const checkVisibility = () => {
        const triggerBottom = window.innerHeight * 0.9;
        revealEls.forEach(el => {
          const rect = el.getBoundingClientRect();
          if (rect.top < triggerBottom) {
            el.classList.add('up');
          }
        });
      };
      if ('IntersectionObserver' in window) {
        const io = new IntersectionObserver(entries => {
          entries.forEach(e => {
            if (e.isIntersecting) {
              e.target.classList.add('up');
              io.unobserve(e.target);
            }
          });
        }, { threshold: 0.1 });
        revealEls.forEach(el => io.observe(el));
      } else {
        window.addEventListener('scroll', checkVisibility);
        checkVisibility();
      }
      setTimeout(checkVisibility, 50);
    };
    window.addEventListener('load', initReveal);
  })();

  // Sticky nav shadow
  window.addEventListener('scroll',()=>{
    const nav = document.querySelector('nav');
    const bgBar = document.querySelector('.nav-bg-bar');
    if(window.innerWidth > 640){
      if(window.scrollY > 20){
        if(bgBar) bgBar.style.height = '112px';
        nav.style.top = '10px';
        nav.style.left = '3%';
        nav.style.right = '3%';
        nav.style.height = '92px';
        nav.style.boxShadow = '0 10px 40px rgba(0,0,0,.4)';
      } else {
        if(bgBar) bgBar.style.height = '152px';
        nav.style.top = '20px';
        nav.style.left = '5%';
        nav.style.right = '5%';
        nav.style.height = '112px';
        nav.style.boxShadow = '0 10px 30px rgba(0,0,0,.25)';
      }
    }
  });
</script>
