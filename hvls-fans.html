<script>
  // Hide loader when page is shown or restored from back-forward cache (BFCache)
  window.addEventListener('pageshow', (event) => {
    const loader = document.getElementById('pageLoader');
    if (loader) {
      setTimeout(() => {
        loader.classList.add('fade-out');
      }, 400);
    }
  });

  // Intercept standard local page links to trigger loader immediately
  document.addEventListener('DOMContentLoaded', () => {
    document.querySelectorAll('a').forEach(link => {
      const href = link.getAttribute('href');
      // Skip loader when navigating back to homepage (index.html)
      if (href && href !== 'index.html' && !href.startsWith('index.html') && (href.endsWith('.html') || href.includes('.html#')) && !link.getAttribute('target') && !href.startsWith('#')) {
        link.addEventListener('click', (e) => {
          if (e.button === 1 || e.metaKey || e.ctrlKey || e.shiftKey) return;
          const loader = document.getElementById('pageLoader');
          if (loader) {
            loader.classList.remove('fade-out');
          }
        });
      }
    });
  });
</script>

<!-- JS SCRIPTS -->
<script>
  // Continuous JS Scroller with Clickable Dots
  (function() {
    const track = document.querySelector('.pole-marquee-track');
    const dots = document.querySelectorAll('.m-dot');
    const slider = document.getElementById('speedSlider');
    
    if (!track) return;

    // Dynamically inject index badges (1 to 7)
    const cards = track.querySelectorAll('.pole-card');
    cards.forEach((card, idx) => {
      const displayIdx = (idx % 7) + 1;
      const badge = document.createElement('span');
      badge.className = 'pole-badge';
      badge.textContent = displayIdx;
      card.appendChild(badge);
    });

    let isPaused = false;
    let speedMultiplier = 1.0;
    let animationId;

    // We manually scroll left every frame
    function scrollLoop() {
      if (!isPaused) {
        track.scrollLeft += 0.5 * speedMultiplier;
        
        // Infinite Loop logic: if we scrolled past the original set, reset to 0 smoothly
        if (track.scrollLeft >= track.scrollWidth / 2) {
          track.scrollLeft -= track.scrollWidth / 2;
        }
        
        updateActiveDot();
      }
      animationId = requestAnimationFrame(scrollLoop);
    }

    // Update active dot based on scroll position
    function updateActiveDot() {
      const cardWidth = track.scrollWidth / 14; // 14 total cards (7 original + 7 duplicate)
      let currentIndex = Math.floor(track.scrollLeft / cardWidth);
      if (currentIndex >= 7) currentIndex -= 7;
      
      dots.forEach(d => d.classList.remove('active'));
      if(dots[currentIndex]) dots[currentIndex].classList.add('active');
    }

    // Start loop
    animationId = requestAnimationFrame(scrollLoop);

    // Pause only on hovering the images (track), not the dots
    track.addEventListener('mouseenter', () => isPaused = true);
    track.addEventListener('mouseleave', () => isPaused = false);

    // Dot click to skip
    dots.forEach(dot => {
      dot.addEventListener('click', (e) => {
        const index = parseInt(e.target.getAttribute('data-index'));
        const cardWidth = track.scrollWidth / 14;
        
        // Calculate target scroll position for that index
        let targetScroll = index * cardWidth;
        
        // If we are currently far into the duplicated set, jump to the duplicate index for smoother skip
        if (track.scrollLeft > (track.scrollWidth / 2) - cardWidth) {
          targetScroll = (index + 7) * cardWidth;
        }

        // Use native smooth scrolling
        track.scrollTo({ left: targetScroll, behavior: 'smooth' });
        
        // Briefly pause auto-scrolling to let the smooth scroll finish
        isPaused = true;
        setTimeout(() => {
          if(!track.matches(':hover')) {
             isPaused = false;
          }
        }, 1000);
      });
    });

    // Speed Slider
    if(slider) {
      slider.addEventListener('input', (e) => {
        speedMultiplier = parseFloat(e.target.value);
      });
    }
  })();

  // Scroll Reveal Animations
  (function() {
    const initReveal = () => {
      const revealEls = document.querySelectorAll('.reveal');
      const checkVisibility = () => {
        const triggerBottom = window.innerHeight * 0.9;
        revealEls.forEach(el => {
          const rect = el.getBoundingClientRect();
          if (rect.top < triggerBottom) {
            el.classList.add('up');
          }
        });
      };
      if ('IntersectionObserver' in window) {
        const io = new IntersectionObserver(entries => {
          entries.forEach(e => {
            if (e.isIntersecting) {
              e.target.classList.add('up');
              io.unobserve(e.target);
            }
          });
        }, { threshold: 0.1 });
        revealEls.forEach(el => io.observe(el));
      } else {
        window.addEventListener('scroll', checkVisibility);
        checkVisibility();
      }
      setTimeout(checkVisibility, 50);
    };
    window.addEventListener('load', initReveal);
  })();
</script>
