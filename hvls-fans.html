<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>High-Volume Low-Speed (HVLS) Fans — EdisonAMP</title>
<meta name="description" content="Proprietary energy-efficient and highly durable HVLS ceiling fans engineered by EdisonAMP. Built to deliver maximum airflow for industrial and commercial workspaces."/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="index.css"/>
</head>
<body style="background: #000; overflow: hidden; margin: 0;">

<!-- MAIN CONTENT PLACEHOLDER -->
<section class="section services-bg" style="padding: 0; min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; background: #000;">
  <div class="section-inner" style="width: 100%; max-width: 100%; padding: 0;">
    
    <!-- HVLS FANS SHOWCASE (MARQUEE) -->
    <div class="reveal pole-marquee-container" style="margin-top: 0; border-radius: 0;">
      <div class="pole-marquee-track">
        <!-- ORIGINAL SET (6 CARDS) -->
        <div class="pole-card">
          <img src="images/hvls_fan_marriage_hall.png" alt="Edison AMP HVLS Fan in Marriage Hall" />
          <div class="pole-title">Kalyana Mandapam</div>
        </div>
        <div class="pole-card">
          <img src="images/hvls_fan_factory.png" alt="Edison AMP HVLS Fan in Industrial Factory" />
          <div class="pole-title">Industrial Factory</div>
        </div>
        <div class="pole-card">
          <img src="images/hvls_fan_warehouse.png" alt="Edison AMP HVLS Fan in Logistics Warehouse" />
          <div class="pole-title">Logistics Warehouse</div>
        </div>
        <div class="pole-card">
          <img src="images/hvls_fan_arena.png" alt="Edison AMP HVLS Fan in Indoor Sports Arena" />
          <div class="pole-title">Sports &amp; Fitness Arena</div>
        </div>
        <div class="pole-card">
          <img src="images/hvls_fan_dairy.png" alt="Edison AMP 5-Blade Straight HVLS Fan in Dairy Farm" />
          <div class="pole-title">Modern Dairy Farm</div>
        </div>
        <div class="pole-card">
          <img src="images/hvls_fan_temple_hall.png" alt="Edison AMP 5-Blade Straight HVLS Fan in Temple Meals Hall" />
          <div class="pole-title">Temple Meals Hall</div>
        </div>

        <!-- DUPLICATED SET (FOR SEAMLESS LOOPING) -->
        <div class="pole-card">
          <img src="images/hvls_fan_marriage_hall.png" alt="Edison AMP HVLS Fan in Marriage Hall" />
          <div class="pole-title">Kalyana Mandapam</div>
        </div>
        <div class="pole-card">
          <img src="images/hvls_fan_factory.png" alt="Edison AMP HVLS Fan in Industrial Factory" />
          <div class="pole-title">Industrial Factory</div>
        </div>
        <div class="pole-card">
          <img src="images/hvls_fan_warehouse.png" alt="Edison AMP HVLS Fan in Logistics Warehouse" />
          <div class="pole-title">Logistics Warehouse</div>
        </div>
        <div class="pole-card">
          <img src="images/hvls_fan_arena.png" alt="Edison AMP HVLS Fan in Indoor Sports Arena" />
          <div class="pole-title">Sports &amp; Fitness Arena</div>
        </div>
        <div class="pole-card">
          <img src="images/hvls_fan_dairy.png" alt="Edison AMP 5-Blade Straight HVLS Fan in Dairy Farm" />
          <div class="pole-title">Modern Dairy Farm</div>
        </div>
        <div class="pole-card">
          <img src="images/hvls_fan_temple_hall.png" alt="Edison AMP 5-Blade Straight HVLS Fan in Temple Meals Hall" />
          <div class="pole-title">Temple Meals Hall</div>
        </div>
      </div>
      
      <!-- CSS Animated Progress Dots & Controls -->
      <div class="marquee-progress-dots">
        <div class="m-dot" data-index="0"></div>
        <div class="m-dot" data-index="1"></div>
        <div class="m-dot" data-index="2"></div>
        <div class="m-dot" data-index="3"></div>
        <div class="m-dot" data-index="4"></div>
        <div class="m-dot" data-index="5"></div>
        
        <!-- Speed Slider -->
        <div class="speed-control">
          <label for="speedSlider">Speed</label>
          <input type="range" id="speedSlider" min="0.25" max="4" step="0.25" value="1">
        </div>
      </div>
    </div>
  </div>
</section>

<!-- FLOATING HOME BUTTON -->
<a href="index.html" class="floating-home-btn" aria-label="Go to Home">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
    <polyline points="9 22 9 12 15 12 15 22"></polyline>
  </svg>
</a>

<!-- JS SCRIPTS -->
<script>
  // Continuous JS Scroller with Clickable Dots
  (function() {
    const track = document.querySelector('.pole-marquee-track');
    const dots = document.querySelectorAll('.m-dot');
    const slider = document.getElementById('speedSlider');
    
    if (!track) return;

    // Dynamically inject index badges (1 to 6)
    const cards = track.querySelectorAll('.pole-card');
    cards.forEach((card, idx) => {
      const displayIdx = (idx % 6) + 1;
      const badge = document.createElement('span');
      badge.className = 'pole-badge';
      badge.textContent = displayIdx;
      card.appendChild(badge);
    });

    let isPaused = false;
    let speedMultiplier = 1.0;
    let animationId;

    // We manually scroll left every frame
    function scrollLoop() {
      if (!isPaused) {
        track.scrollLeft += 0.5 * speedMultiplier;
        
        // Infinite Loop logic: if we scrolled past the original set, reset to 0 smoothly
        if (track.scrollLeft >= track.scrollWidth / 2) {
          track.scrollLeft -= track.scrollWidth / 2;
        }
        
        updateActiveDot();
      }
      animationId = requestAnimationFrame(scrollLoop);
    }

    // Update active dot based on scroll position
    function updateActiveDot() {
      const cardWidth = track.scrollWidth / 12; // 12 total cards (6 original + 6 duplicate)
      let currentIndex = Math.floor(track.scrollLeft / cardWidth);
      if (currentIndex >= 6) currentIndex -= 6;
      
      dots.forEach(d => d.classList.remove('active'));
      if(dots[currentIndex]) dots[currentIndex].classList.add('active');
    }

    // Start loop
    animationId = requestAnimationFrame(scrollLoop);

    // Pause only on hovering the images (track), not the dots
    track.addEventListener('mouseenter', () => isPaused = true);
    track.addEventListener('mouseleave', () => isPaused = false);

    // Dot click to skip
    dots.forEach(dot => {
      dot.addEventListener('click', (e) => {
        const index = parseInt(e.target.getAttribute('data-index'));
        const cardWidth = track.scrollWidth / 12;
        
        // Calculate target scroll position for that index
        let targetScroll = index * cardWidth;
        
        // If we are currently far into the duplicated set, jump to the duplicate index for smoother skip
        if (track.scrollLeft > (track.scrollWidth / 2) - cardWidth) {
          targetScroll = (index + 6) * cardWidth;
        }

        // Use native smooth scrolling
        track.scrollTo({ left: targetScroll, behavior: 'smooth' });
        
        // Briefly pause auto-scrolling to let the smooth scroll finish
        isPaused = true;
        setTimeout(() => {
          if(!track.matches(':hover')) {
             isPaused = false;
          }
        }, 1000);
      });
    });

    // Speed Slider
    if(slider) {
      slider.addEventListener('input', (e) => {
        speedMultiplier = parseFloat(e.target.value);
      });
    }
  })();

  // Scroll Reveal Animations
  (function() {
    const initReveal = () => {
      const revealEls = document.querySelectorAll('.reveal');
      const checkVisibility = () => {
        const triggerBottom = window.innerHeight * 0.9;
        revealEls.forEach(el => {
          const rect = el.getBoundingClientRect();
          if (rect.top < triggerBottom) {
            el.classList.add('up');
          }
        });
      };
      if ('IntersectionObserver' in window) {
        const io = new IntersectionObserver(entries => {
          entries.forEach(e => {
            if (e.isIntersecting) {
              e.target.classList.add('up');
              io.unobserve(e.target);
            }
          });
        }, { threshold: 0.1 });
        revealEls.forEach(el => io.observe(el));
      } else {
        window.addEventListener('scroll', checkVisibility);
        checkVisibility();
      }
      setTimeout(checkVisibility, 50);
    };
    window.addEventListener('load', initReveal);
  })();
</script>

</body>
</html>
