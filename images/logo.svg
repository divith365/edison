<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 350" width="100%" height="100%">
        <defs>
          <style>
            @import url('https://fonts.googleapis.com/css2?family=Comfortaa:wght@600;700&family=Fredoka:wght@600;700&family=Inter:wght@600;700&family=Montserrat:wght@600;700;800&family=Outfit:wght@600;700;800&family=Quicksand:wght@600;700&family=Space+Grotesk:wght@600;700&display=swap');
            .vector-base-container {
              background-color: #0F1E36;
              width: 1500px;
              height: 350px;
              display: flex;
              flex-direction: column;
              align-items: center;
              justify-content: center;
              text-align: center;
              box-sizing: border-box;
              font-family: 'Fredoka', system-ui, sans-serif;
            }
            .text-row-container {
              display: flex;
              align-items: center;
              justify-content: center;
              text-transform: uppercase;
              font-size: 120px;
              letter-spacing: 0.08em;
              font-weight: 600;
              color: #FFFFFF;
              line-height: 1;
              white-space: nowrap;
            }
            .custom-o-graphic {
              width: 1.05em;
              height: 1.05em;
              margin-left: -0.05em;
              margin-right: -0.02em;
              display: inline-block;
            }
            .suffix-amp-row {
              margin-left: 0.35em;
              color: #FFB000;
            }
            .tagline-container-block {
              margin-top: 18px;
              font-family: "Inter", sans-serif;
              font-size: 39px;
              letter-spacing: 0.12em;
              color: #ECEFF1;
              text-transform: uppercase;
              font-weight: 500;
              line-height: 1.2;
              white-space: nowrap;
              max-width: 100%;
            }
          </style>
          
          <filter id="glow-fx" x="-30%" y="-30%" width="160%" height="160%">
            <feGaussianBlur stdDeviation="3.5" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
          </filter>
          
          <filter id="bulb-glow-fx" x="-35%" y="-35%" width="170%" height="170%">
            <feGaussianBlur stdDeviation="5" result="b1" />
            <feGaussianBlur stdDeviation="2" result="b2" />
            <feMerge>
              <feMergeNode in="b1" />
              <feMergeNode in="b2" />
              <feMergeNode in="SourceGraphic" />
            </feMerge>
          </filter>
        </defs>

        <rect width="1500" height="350" fill="#0F1E36" />

        <foreignObject x="0" y="0" width="1500" height="350">
          <div xmlns="http://www.w3.org/1999/xhtml" class="vector-base-container">
            <div class="text-row-container">
              <span>EDIS</span>
              <div class="custom-o-graphic">
                <svg viewBox="0 0 100 100" width="100%" height="100%">
                  <!-- O Ring -->
                  <circle cx="50" cy="50" r="40" fill="none" stroke="#FFFFFF" stroke-width="11" />
                  
                  <!-- Internal Bulb -->
                  <g transform="translate(0, -3) scale(0.95)" style="transform-origin: 50px 48px">
                    <path d="M34,44 C34,35.16 41.16,28 50,28 C58.84,28 66,35.16 66,44 C66,49.8 62.8,54.5 59.5,57.8 C58,59.3 57.2,61.6 57.2,63.8 L57.2,65.5 L42.8,65.5 L42.8,63.8 C42.8,61.6 42,59.3 40.5,57.8 C37.2,54.5 34,49.8 34,44 Z" 
                          fill="transparent" 
                          stroke="#FFFFFF" 
                          stroke-width="2" 
                          filter="url(#bulb-glow-fx)" />
                    
                    <path d="M44.5,66.5 L55.5,66.5 C56.3,66.5 57,67 57,67.8 L57,69.5 C57,70.3 56.3,71 55.5,71 L44.5,71 C43.7,71 43,70.3 43,69.5 L43,67.8 C43,67 43.7,66.5 44.5,66.5 Z" fill="#FFFFFF" />
                    <path d="M47,72.5 L53,72.5 C53.5,72.5 54,72.9 54,73.4 L53.5,75 C53,76 47,76 46.5,75 L46,73.4 C46,72.9 46.5,72.5 47,72.5 Z" fill="#FFFFFF" opacity="0.9" />

                    
                      <circle cx="50" cy="36" r="3.5" fill="#FF6B00" filter="url(#glow-fx)" />
                      <circle cx="50" cy="45" r="3.5" fill="#00E396" filter="url(#glow-fx)" />
                      <circle cx="50" cy="54" r="3.5" fill="#0052FF" filter="url(#glow-fx)" />
                    
                  </g>
                </svg>
              </div>
              <span>N</span>
              <span class="suffix-amp-row">AMP</span>
            </div>

            <div class="tagline-container-block">
              <span style="color: #38BDF8;">LED LIGHTS</span>
              <span style="color: #FB7185; margin: 0 10px;">|</span>
              <span style="color: #4ADE80;">HVLS FANS</span>
              <span style="color: #FB7185; margin: 0 10px;">|</span>
              <span style="color: #FFB000;">HT &amp; LT ELECTRICAL WORKS</span>
            </div>
          </div>
        </foreignObject>
      </svg>