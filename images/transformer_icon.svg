<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="100%" height="100%">
  <!-- Base structure -->
  <rect x="8" y="32" width="32" height="10" rx="2" fill="#0b1120" />
  <rect x="11" y="14" width="26" height="18" rx="2" fill="#FB923C" stroke="#0b1120" stroke-width="2" />
  <!-- Cooling fins on the side -->
  <line x1="6" y1="18" x2="11" y2="18" stroke="#0b1120" stroke-width="2" stroke-linecap="round" />
  <line x1="6" y1="23" x2="11" y2="23" stroke="#0b1120" stroke-width="2" stroke-linecap="round" />
  <line x1="6" y1="28" x2="11" y2="28" stroke="#0b1120" stroke-width="2" stroke-linecap="round" />
  <line x1="37" y1="18" x2="42" y2="18" stroke="#0b1120" stroke-width="2" stroke-linecap="round" />
  <line x1="37" y1="23" x2="42" y2="23" stroke="#0b1120" stroke-width="2" stroke-linecap="round" />
  <line x1="37" y1="28" x2="42" y2="28" stroke="#0b1120" stroke-width="2" stroke-linecap="round" />
  <!-- Bushings on top (three insulators) -->
  <rect x="15" y="8" width="4" height="6" fill="#0b1120" />
  <rect x="22" y="8" width="4" height="6" fill="#0b1120" />
  <rect x="29" y="8" width="4" height="6" fill="#0b1120" />
  <!-- High voltage lines/arcs -->
  <path d="M17 5 L17 8 M24 5 L24 8 M31 5 L31 8" stroke="#0b1120" stroke-width="1.5" stroke-linecap="round" />
  <!-- Lightning bolt symbol on the transformer body to indicate electrical power -->
  <path d="M25 18 L21 24 L24 24 L23 28 L27 22 L24 22 Z" fill="#ffffff" stroke="#0b1120" stroke-width="1.5" stroke-linejoin="round" />
</svg>
