<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="100%" height="100%">
  <!-- Ground line -->
  <line x1="6" y1="44" x2="42" y2="44" stroke="#0b1120" stroke-width="2.5" stroke-linecap="round" />
  <!-- Pole shaft -->
  <path d="M22 44 L23 10 L25 10 L26 44 Z" fill="#0b1120" />
